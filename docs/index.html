// ── GRAPH VIEW — true orbital mechanics ──
function GraphView({ systems, activeSystem, onAddSystem, setSelBlock, setSelSystem, setTab, onQuestClick }) {
  const canvasRef = React.useRef(null);
  const containerRef = React.useRef(null);
  const stRef = React.useRef({
    systems:[], activeId:null, animId:null, zoom:1, panX:0, panY:0,
    stars:[], starVels:[], starHoverT:[], hoveredStarId:null, draggingStarIdx:-1,
    planetAngles:{}, planetOrbits:{}, planetPos:{},
    satAngles:{}, satSpeeds:{}, satPos:{},
  });
  const dragStart  = React.useRef(null);
  const pinchRef   = React.useRef(null);
  const touchCbRef = React.useRef({});

  React.useEffect(() => {
    stRef.current.systems = systems;
    stRef.current.activeId = activeSystem?.id;
  }, [systems, activeSystem?.id]);

  React.useEffect(() => {
    const canvas = canvasRef.current, con = containerRef.current;
    if (!canvas||!con) return;
    const ctx = canvas.getContext('2d');

    const buildStars = () => {
      const w=stRef.current.cssW||canvas.width, h=stRef.current.cssH||canvas.height;
      const N=(stRef.current.systems||[]).length;
      if(stRef.current.stars.length!==N){
        const init=[];
        if(N===1){init.push({x:w/2,y:h/2});}
        else{for(let i=0;i<N;i++){
          // Random positions across canvas (no circle — physics takes over)
          init.push({x:w*0.15+Math.random()*w*0.7, y:h*0.15+Math.random()*h*0.7});
        }}
        stRef.current.stars=init;
        stRef.current.starVels=init.map(()=>({vx:0,vy:0}));
      }
    };

    const resize = () => {
      const dpr=window.devicePixelRatio||1, cw=con.clientWidth, ch=con.clientHeight;
      canvas.width=cw*dpr; canvas.height=ch*dpr;
      canvas.style.width=cw+'px'; canvas.style.height=ch+'px';
      stRef.current.dpr=dpr; stRef.current.cssW=cw; stRef.current.cssH=ch;
      buildStars();
    };
    resize();
    window.addEventListener('resize', resize);

    const tick = () => {
      const st=stRef.current;
      const{systems,activeId,stars,starVels,planetAngles,planetOrbits,satAngles,satSpeeds}=st;
      const w=st.cssW||canvas.width, h=st.cssH||canvas.height, dpr=st.dpr||1;
      if(stars.length!==(systems||[]).length) buildStars();
      const allBlocks=(systems||[]).flatMap(s=>s.blocks.map(b=>({...b,systemId:s.id})));

      // ── Star physics: FDG — repulsion everywhere, spring only between neighbors ──
      const IDEAL=300, SPRING_K=0.003, REP_K=400000, DAMP=0.82;
      const N=systems.length;
      const isNeighbor=(i,j)=>Math.abs(i-j)===1;
      const dragIdx=st.draggingStarIdx;
      for(let i=0;i<stars.length;i++){
        if(i===dragIdx) continue; // pinned to mouse
        if(!starVels[i]) starVels[i]={vx:0,vy:0};
        let fx=0,fy=0;
        for(let j=0;j<stars.length;j++){
          if(i===j) continue;
          const dx=stars[i].x-stars[j].x,dy=stars[i].y-stars[j].y;
          const d=Math.sqrt(dx*dx+dy*dy)||1;
          // repulsion between all stars
          fx+=dx/d*Math.min(REP_K/(d*d),350); fy+=dy/d*Math.min(REP_K/(d*d),350);
          // spring attraction only between chain neighbors
          // ideal dist = outermost orbit radius of each star + comfortable gap
          if(isNeighbor(i,j)){
            const orbitR=bl=>bl.length>0 ? 140+(bl.length-1)*75+40 : 60;
            const ri=orbitR(systems[i]?.blocks||[]), rj=orbitR(systems[j]?.blocks||[]);
            const idealDist=ri+rj+80;
            if(d>idealDist){const s=(d-idealDist)*SPRING_K; fx-=dx/d*s; fy-=dy/d*s;}
          }
        }
        fx+=(w/2-stars[i].x)*0.0004; fy+=(h/2-stars[i].y)*0.0004;
        starVels[i].vx=(starVels[i].vx+fx)*DAMP; starVels[i].vy=(starVels[i].vy+fy)*DAMP;
        stars[i]={x:stars[i].x+starVels[i].vx, y:stars[i].y+starVels[i].vy};
      }

      // ── Planet orbits ──
      const planetPos={};
      for(const blk of allBlocks){
        const si=(systems||[]).findIndex(s=>s.id===blk.systemId);
        const star=stars[si]; if(!star) continue;
        const sys=systems[si];
        const li=sys.blocks.findIndex(b=>b.id===blk.id);
        if(!planetOrbits[blk.id]){
          const r=140+li*75;
          planetOrbits[blk.id]={radius:r, speed:0.007*Math.pow(140/r,1.5), size:14+Math.min(blk.reward||0,300)/11};
          planetAngles[blk.id]=(li/Math.max(sys.blocks.length,1))*Math.PI*2;
        }
        planetAngles[blk.id]+=planetOrbits[blk.id].speed;
        const{radius,size}=planetOrbits[blk.id];
        planetPos[blk.id]={x:star.x+Math.cos(planetAngles[blk.id])*radius, y:star.y+Math.sin(planetAngles[blk.id])*radius, r:size, sysId:blk.systemId};
      }
      st.planetPos=planetPos;

      // ── Satellite orbits ──
      const satPos={};
      for(const blk of allBlocks){
        const pp=planetPos[blk.id]; if(!pp||!blk.quests.length) continue;
        const sys=(systems||[]).find(s=>s.id===blk.systemId);
        const isAct=sys&&sys.id===activeId;
        if(!satAngles[blk.id]){
          satAngles[blk.id]=blk.quests.map((_,qi)=>(qi/Math.max(blk.quests.length,1))*Math.PI*2);
          satSpeeds[blk.id]=blk.quests.map(()=>0.018);
        }
        while(satAngles[blk.id].length<blk.quests.length){satAngles[blk.id].push(Math.random()*Math.PI*2);satSpeeds[blk.id].push(0.018);}
        satAngles[blk.id].length=blk.quests.length; satSpeeds[blk.id].length=blk.quests.length;
        satPos[blk.id]=blk.quests.map((q,qi)=>{
          satAngles[blk.id][qi]+=satSpeeds[blk.id][qi];
          const ang=satAngles[blk.id][qi], satR=pp.r+22+qi*18;
          const qr=5+Math.min(q.reward||0,200)/18;
          return{x:pp.x+Math.cos(ang)*satR, y:pp.y+Math.sin(ang)*satR, r:qr, quest:q, sysId:blk.systemId, blockId:blk.id, isActive:!!isAct};
        });
      }
      st.satPos=satPos;

      // ── Hover T interpolation ──
      if(!st.starHoverT||st.starHoverT.length!==systems.length) st.starHoverT=systems.map(()=>0);
      for(let i=0;i<systems.length;i++){
        const tgt=(st.hoveredStarId&&systems[i].id===st.hoveredStarId)?1:0;
        st.starHoverT[i]+=(tgt-st.starHoverT[i])*0.1;
      }
      const starHoverT=st.starHoverT;
      const globalHoverT=starHoverT.length?Math.max(...starHoverT):0;

      // ── Draw ──
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.save();
      ctx.scale(dpr,dpr);
      ctx.translate(w/2+st.panX,h/2+st.panY); ctx.scale(st.zoom,st.zoom); ctx.translate(-w/2,-h/2);

      // ── Star–star lines: only between chain neighbors ──
      const HOV_COL='#27E7F5';
      for(let i=0;i<stars.length-1;i++){
        const j=i+1;
        const lineT=Math.max(starHoverT[i]||0, starHoverT[j]||0);
        ctx.beginPath(); ctx.moveTo(stars[i].x,stars[i].y); ctx.lineTo(stars[j].x,stars[j].y);
        if(lineT>0.01){
          ctx.shadowColor=HOV_COL; ctx.shadowBlur=lerp(0,10,lineT);
          ctx.strokeStyle=`rgba(39,231,245,${lerp(0.15,0.9,lineT)})`; ctx.lineWidth=lerp(1,1.5,lineT); ctx.setLineDash([]);
        } else {
          ctx.shadowBlur=0;
          ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1; ctx.setLineDash([5,12]);
        }
        ctx.stroke(); ctx.setLineDash([]); ctx.shadowBlur=0;
      }

      // ── Stars + planet orbit rings ──
      (systems||[]).forEach((sys,si)=>{
        const star=stars[si]; if(!star) return;
        const isAct=sys.id===activeId;
        const hT=starHoverT[si]||0;   // 1 = this star is hovered, others stay normal
        const effectT=hT;
        const ownCol=sys.color||'#ffd700';
        const drawCol=lerpHex(ownCol,HOV_COL,effectT);
        const starR=28+Math.min(sys.reward||0,400)/12;
        // Orbit rings
        sys.blocks.forEach(b=>{
          const orb=planetOrbits[b.id]; if(!orb) return;
          ctx.beginPath(); ctx.arc(star.x,star.y,orb.radius,0,Math.PI*2);
          const ringA=lerp(isAct?0.09:0.03, 0.07, effectT);
          ctx.strokeStyle=isAct?hexRgba(drawCol,ringA):`rgba(255,255,255,${ringA*0.4})`;
          ctx.lineWidth=1; ctx.setLineDash([2,9]); ctx.stroke(); ctx.setLineDash([]);
        });
        ctx.save(); ctx.translate(star.x,star.y);
        // Glow shadow for hovered star
        if(effectT>0.01){ ctx.shadowColor=HOV_COL; ctx.shadowBlur=lerp(0,30,effectT); }
        // Outer halo gradient
        const glowA=lerp(isAct?0.28:0.15, 1.0, effectT);
        const g=ctx.createRadialGradient(0,0,starR*0.3,0,0,starR*3.5);
        g.addColorStop(0,hexRgba(drawCol,glowA));
        g.addColorStop(1,hexRgba(drawCol,0));
        ctx.beginPath(); ctx.arc(0,0,starR*3.5,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
        // Body
        ctx.beginPath(); ctx.arc(0,0,starR,0,Math.PI*2);
        const bodyA=lerp(isAct?0.97:0.35, 1.0, effectT);
        ctx.fillStyle=sys.completed?`rgba(16,185,129,${bodyA})`:hexRgba(drawCol,bodyA);
        ctx.fill();
        const strokeA=lerp(isAct?0.95:0.4, 1.0, effectT);
        ctx.strokeStyle=sys.completed?`rgba(16,185,129,${strokeA})`:hexRgba(drawCol,strokeA);
        ctx.lineWidth=lerp(1.5, 2.5, effectT); ctx.stroke();
        ctx.shadowBlur=0;
        // Label
        ctx.font='700 10px Orbitron,sans-serif';
        ctx.fillStyle=effectT>0.01?`rgba(39,231,245,${lerp(0.8,1,effectT)})`:'rgba(255,255,255,0.8)';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(sys.title.toUpperCase().slice(0,12),0,starR+15);
        ctx.restore();
      });

      // Planet → star lines + Planets + Satellites
      ctx.save();

      for(const blk of allBlocks){
        const pp=planetPos[blk.id]; if(!pp) continue;
        const si=(systems||[]).findIndex(s=>s.id===blk.systemId);
        const star=stars[si]; if(!star) continue;
        const sys=systems[si]; const isAct=sys&&sys.id===activeId;
        ctx.beginPath(); ctx.moveTo(star.x,star.y); ctx.lineTo(pp.x,pp.y);
        ctx.strokeStyle=isAct?'rgba(15,168,245,0.09)':'rgba(30,50,80,0.13)';
        ctx.lineWidth=1; ctx.setLineDash([2,9]); ctx.stroke(); ctx.setLineDash([]);
      }

      // Planets
      for(const blk of allBlocks){
        const pp=planetPos[blk.id]; if(!pp) continue;
        const sys=(systems||[]).find(s=>s.id===blk.systemId);
        const isAct=sys&&sys.id===activeId, isDone=blk.completed;
        const R=pp.r;
        // Satellite orbit rings
        blk.quests.forEach((_,qi)=>{
          const satR=R+22+qi*18;
          ctx.beginPath(); ctx.arc(pp.x,pp.y,satR,0,Math.PI*2);
          ctx.strokeStyle=isDone?'rgba(16,185,129,0.1)':isAct?'rgba(15,168,245,0.1)':'rgba(255,255,255,0.03)';
          ctx.lineWidth=0.8; ctx.setLineDash([2,7]); ctx.stroke(); ctx.setLineDash([]);
        });
        // Glow
        if(isAct){const g=ctx.createRadialGradient(pp.x,pp.y,R-4,pp.x,pp.y,R+30);g.addColorStop(0,'rgba(15,168,245,0.22)');g.addColorStop(1,'rgba(15,168,245,0)');ctx.beginPath();ctx.arc(pp.x,pp.y,R+30,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
        if(isDone){const g=ctx.createRadialGradient(pp.x,pp.y,R-4,pp.x,pp.y,R+20);g.addColorStop(0,'rgba(16,185,129,0.22)');g.addColorStop(1,'rgba(16,185,129,0)');ctx.beginPath();ctx.arc(pp.x,pp.y,R+20,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
        // Body
        const pg=ctx.createRadialGradient(pp.x-R*0.3,pp.y-R*0.3,R*0.1,pp.x,pp.y,R);
        if(isDone){pg.addColorStop(0,'rgba(20,100,70,0.92)');pg.addColorStop(1,'rgba(8,40,28,0.96)');}
        else if(isAct){pg.addColorStop(0,'rgba(20,60,160,0.92)');pg.addColorStop(1,'rgba(6,20,60,0.96)');}
        else{pg.addColorStop(0,'rgba(20,30,50,0.9)');pg.addColorStop(1,'rgba(4,10,20,0.96)');}
        ctx.beginPath();ctx.arc(pp.x,pp.y,R,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();
        ctx.strokeStyle=isDone?'#10b981':isAct?'#0fa8f5':'#1a2d4a';
        ctx.lineWidth=isAct?2:1.5;ctx.stroke();
        // Progress arc
        const tot=blk.quests.length,dn=blk.quests.filter(q=>q.done).length;
        if(tot>0&&dn>0){ctx.beginPath();ctx.arc(pp.x,pp.y,R+5,-Math.PI/2,-Math.PI/2+(dn/tot)*Math.PI*2);ctx.strokeStyle=isDone?'#10b981':'#0fa8f5';ctx.lineWidth=2.5;ctx.stroke();}
        // Label
        ctx.textAlign='center';ctx.textBaseline='middle';
        const fs=Math.max(9,Math.round(R*0.58));
        ctx.font=`bold ${fs}px Rajdhani,sans-serif`;
        ctx.fillStyle=isDone?'#10b981':isAct?'#e2e8f0':'#5a6478';
        const t=blk.title.length>12?blk.title.slice(0,12)+'…':blk.title;
        ctx.fillText(t,pp.x,pp.y-(tot>0?7:0));
        if(tot>0){ctx.font=`bold 9px Orbitron,sans-serif`;ctx.fillStyle=isDone?'rgba(16,185,129,0.8)':'rgba(58,90,122,0.9)';ctx.fillText(`${dn}/${tot}`,pp.x,pp.y+9);}
      }

      // Satellites
      for(const blk of allBlocks){
        const sats=satPos[blk.id]; if(!sats) continue;
        for(const sat of sats){
          const{x,y,r,quest:q,isActive:isAct}=sat,qDone=q.done;
          if(isAct&&!qDone){const sg=ctx.createRadialGradient(x,y,0,x,y,r+6);sg.addColorStop(0,'rgba(15,168,245,0.4)');sg.addColorStop(1,'rgba(15,168,245,0)');ctx.beginPath();ctx.arc(x,y,r+6,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();}
          ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
          ctx.fillStyle=qDone?'rgba(16,185,129,0.85)':isAct?'rgba(15,168,245,0.75)':'rgba(15,25,45,0.85)';
          ctx.fill();ctx.strokeStyle=qDone?'#10b981':isAct?'#0fa8f5':'#1a2d4a';ctx.lineWidth=1.2;ctx.stroke();
          if(r>=7){ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`bold ${Math.max(6,Math.round(r*0.6))}px Orbitron,monospace`;ctx.fillStyle=qDone||isAct?'#fff':'#3a5a7a';ctx.fillText(qDone?'✓':'·',x,y);}
        }
      }

      ctx.restore(); // end orbAlpha group
      ctx.restore(); // end pan/zoom transform
      st.animId=requestAnimationFrame(tick);
    };
    stRef.current.animId=requestAnimationFrame(tick);

    // Touch events must be passive:false for preventDefault to work on iOS
    const ts=e=>touchCbRef.current.onTS?.(e);
    const tm=e=>touchCbRef.current.onTM?.(e);
    const te=e=>touchCbRef.current.onTE?.(e);
    canvas.addEventListener('touchstart',ts,{passive:false});
    canvas.addEventListener('touchmove', tm,{passive:false});
    canvas.addEventListener('touchend',  te,{passive:false});
    canvas.addEventListener('touchcancel',te,{passive:false});

    const onWheel=e=>{
      e.preventDefault();
      const rect=canvas.getBoundingClientRect();
      const mx=e.clientX-rect.left, my=e.clientY-rect.top;
      const w=stRef.current.cssW||canvas.width, h=stRef.current.cssH||canvas.height;
      const oldZoom=stRef.current.zoom;
      const newZoom=Math.max(0.2,Math.min(5,oldZoom*(e.deltaY>0?0.9:1.1)));
      const ratio=newZoom/oldZoom;
      // Keep world point under cursor fixed: newPan = cursor*(1-ratio) + oldPan*ratio
      stRef.current.panX=(mx-w/2)*(1-ratio)+stRef.current.panX*ratio;
      stRef.current.panY=(my-h/2)*(1-ratio)+stRef.current.panY*ratio;
      stRef.current.zoom=newZoom;
    };
    canvas.addEventListener('wheel',onWheel,{passive:false});
    return()=>{
      cancelAnimationFrame(stRef.current.animId);
      window.removeEventListener('resize',resize);
      canvas.removeEventListener('wheel',onWheel);
      canvas.removeEventListener('touchstart',ts);
      canvas.removeEventListener('touchmove',tm);
      canvas.removeEventListener('touchend',te);
      canvas.removeEventListener('touchcancel',te);
    };
  },[]);

  const toWorld=(mx,my)=>{const canvas=canvasRef.current;if(!canvas)return{x:mx,y:my};const w=stRef.current.cssW||canvas.width,h=stRef.current.cssH||canvas.height,z=stRef.current.zoom,px=stRef.current.panX,py=stRef.current.panY;return{x:(mx-w/2-px)/z+w/2,y:(my-h/2-py)/z+h/2};};
  const getPlanet=(mx,my)=>{for(const[blockId,pp]of Object.entries(stRef.current.planetPos||{})){const dx=pp.x-mx,dy=pp.y-my;if(Math.sqrt(dx*dx+dy*dy)<pp.r+10)return{blockId,...pp};}return null;};
  const getSatellite=(mx,my)=>{for(const sats of Object.values(stRef.current.satPos||{})){for(const sat of sats){const dx=sat.x-mx,dy=sat.y-my;if(Math.sqrt(dx*dx+dy*dy)<sat.r+6)return sat;}}return null;};
  const getStar=(mx,my)=>{const{stars,systems:sl}=stRef.current;if(!stars||!sl)return null;for(let i=0;i<sl.length;i++){const s=stars[i];if(!s)continue;const sr=28+Math.min((sl[i].reward||0),400)/12;const dx=s.x-mx,dy=s.y-my;if(Math.sqrt(dx*dx+dy*dy)<sr+12)return sl[i];}return null;};
  const getStarIdx=(mx,my)=>{const{stars,systems:sl}=stRef.current;if(!stars||!sl)return -1;for(let i=0;i<sl.length;i++){const s=stars[i];if(!s)continue;const sr=28+Math.min((sl[i].reward||0),400)/12;const dx=s.x-mx,dy=s.y-my;if(Math.sqrt(dx*dx+dy*dy)<sr+12)return i;}return -1;};
  const onMD=e=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const rect=canvas.getBoundingClientRect();
    const{x:mx,y:my}=toWorld(e.clientX-rect.left,e.clientY-rect.top);
    const sat=getSatellite(mx,my);
    const planet=!sat?getPlanet(mx,my):null;
    const starIdx=(!sat&&!planet)?getStarIdx(mx,my):-1;
    const star=(starIdx>=0)?(stRef.current.systems||[])[starIdx]:null;
    const isPan=!sat&&!planet&&starIdx<0;
    dragStart.current={x:e.clientX,y:e.clientY,sat,planet,star,starIdx,isPan};
    if(starIdx>=0){
      stRef.current.draggingStarIdx=starIdx;
      if(stRef.current.starVels[starIdx]) stRef.current.starVels[starIdx]={vx:0,vy:0};
      canvas.style.cursor='grabbing';
    } else if(isPan){
      canvas.style.cursor='grabbing';
    }
    e.preventDefault();
  };
  const onMM=e=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const rect=canvas.getBoundingClientRect();
    const{x:mx,y:my}=toWorld(e.clientX-rect.left,e.clientY-rect.top);
    // Drag star
    const dIdx=stRef.current.draggingStarIdx;
    if(dIdx>=0){
      stRef.current.stars[dIdx]={x:mx,y:my};
      if(stRef.current.starVels[dIdx]) stRef.current.starVels[dIdx]={vx:0,vy:0};
      canvas.style.cursor='grabbing';
      return;
    }
    // Pan
    if(dragStart.current?.isPan){
      const dx=e.clientX-dragStart.current.x, dy=e.clientY-dragStart.current.y;
      stRef.current.panX+=dx; stRef.current.panY+=dy;
      dragStart.current.x=e.clientX; dragStart.current.y=e.clientY;
      return;
    }
    // Hover highlights
    const hovP=getPlanet(mx,my);const hovS=!hovP&&getSatellite(mx,my);const hovStar=!hovP&&!hovS&&getStar(mx,my);
    stRef.current.hoveredStarId=hovStar?hovStar.id:null;
    canvas.style.cursor=(hovP||hovS||hovStar)?'pointer':'grab';
  };
  const onMU=e=>{
    const canvas=canvasRef.current;
    const start=dragStart.current;dragStart.current=null;
    const dIdx=stRef.current.draggingStarIdx;
    stRef.current.draggingStarIdx=-1;
    if(!start)return;
    if(dIdx>=0){
      // Release star — let physics take over again
      if(canvas) canvas.style.cursor='grab';
      const moved=Math.abs(e.clientX-start.x)+Math.abs(e.clientY-start.y);
      if(moved<8 && start.star){setSelSystem(start.star.id);setTab('blocks');}
      return;
    }
    if(start.isPan){if(canvas)canvas.style.cursor='grab';return;}
    const moved=Math.abs(e.clientX-start.x)+Math.abs(e.clientY-start.y);
    if(moved<10){
      if(start.planet){setSelBlock(start.planet.blockId);setTab('blocks');return;}
      if(start.star){setSelSystem(start.star.id);setTab('blocks');return;}
      if(start.sat){onQuestClick(start.sat.quest,start.sat.sysId,start.sat.blockId,start.sat.isActive);}
    }
  };

  // ── Touch handlers ──
  const onTS=e=>{
    e.preventDefault();
    if(e.touches.length===1){
      const t=e.touches[0];
      onMD({clientX:t.clientX,clientY:t.clientY,preventDefault:()=>{}});
      // Glow on touch
      const canvas=canvasRef.current; if(!canvas) return;
      const rect=canvas.getBoundingClientRect();
      const{x:mx,y:my}=toWorld(t.clientX-rect.left,t.clientY-rect.top);
      const hovStar=getStar(mx,my);
      stRef.current.hoveredStarId=hovStar?hovStar.id:null;
    } else if(e.touches.length>=2){
      // Cancel any single-finger drag
      dragStart.current=null; stRef.current.draggingStarIdx=-1;
      stRef.current.hoveredStarId=null;
      const t1=e.touches[0],t2=e.touches[1];
      pinchRef.current={
        dist:Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY),
        midX:(t1.clientX+t2.clientX)/2, midY:(t1.clientY+t2.clientY)/2,
      };
    }
  };
  const onTM=e=>{
    e.preventDefault();
    if(e.touches.length>=2){
      const t1=e.touches[0],t2=e.touches[1];
      const dist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
      const midX=(t1.clientX+t2.clientX)/2, midY=(t1.clientY+t2.clientY)/2;
      const canvas=canvasRef.current; if(!canvas||!pinchRef.current) return;
      const rect=canvas.getBoundingClientRect();
      const w=stRef.current.cssW||canvas.width, h=stRef.current.cssH||canvas.height;
      const p=pinchRef.current;
      // Incremental zoom toward pinch midpoint
      const oldZoom=stRef.current.zoom;
      const newZoom=Math.max(0.2,Math.min(5,oldZoom*(dist/p.dist)));
      const ratio=newZoom/oldZoom;
      const cmx=midX-rect.left, cmy=midY-rect.top;
      stRef.current.panX=(cmx-w/2)*(1-ratio)+stRef.current.panX*ratio;
      stRef.current.panY=(cmy-h/2)*(1-ratio)+stRef.current.panY*ratio;
      stRef.current.zoom=newZoom;
      // Pan from midpoint shift
      stRef.current.panX+=midX-p.midX;
      stRef.current.panY+=midY-p.midY;
      pinchRef.current={dist,midX,midY};
    } else if(e.touches.length===1&&!pinchRef.current){
      const t=e.touches[0];
      onMM({clientX:t.clientX,clientY:t.clientY});
    }
  };
  const onTE=e=>{
    e.preventDefault();
    if(e.touches.length===0){
      if(pinchRef.current){
        pinchRef.current=null; dragStart.current=null;
      } else {
        stRef.current.hoveredStarId=null;
        const t=e.changedTouches[0];
        onMU({clientX:t.clientX,clientY:t.clientY});
      }
    } else if(e.touches.length===1){
      // Dropped from 2 → 1 finger: switch to pan
      pinchRef.current=null;
      const t=e.touches[0];
      dragStart.current={x:t.clientX,y:t.clientY,isPan:true};
    }
  };

  // Keep touchCbRef current so addEventListener callbacks always call latest handlers
  touchCbRef.current = {onTS, onTM, onTE};

  const allBlocks = systems.flatMap(s=>s.blocks);
  return (
    <div ref={containerRef} className="graph-wrap" style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',padding:'24px',gap:'16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div>
          <div className="graph-title" style={{fontFamily:'var(--hud)',fontSize:'18px',fontWeight:800,letterSpacing:'2px'}}>ГРАФ ПРОГРЕССА</div>
          <div className="graph-sub" style={{fontSize:'12px',color:'var(--mut2)',marginTop:'4px',fontWeight:600}}>
            {allBlocks.filter(b=>b.completed).length}/{allBlocks.length} планет завершено · {systems.filter(s=>s.completed).length}/{systems.length} систем
          </div>
        </div>
        <button className="btn btn-pur graph-sys-btn" onClick={()=>setTab('blocks')}>✦ Системы</button>
      </div>
      {systems.length===0 ? (
        <div className="empty" style={{flex:1}}>
          <div className="empty-ic">&#x2B21;</div>
          <div className="empty-txt">Нет систем</div>
          <button className="btn btn-pur" onClick={onAddSystem}>Создать первую</button>
        </div>
      ) : (
        <canvas ref={canvasRef} style={{flex:1,width:'100%',display:'block',touchAction:'none',cursor:'grab'}}
          onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU}
          onMouseLeave={()=>{ dragStart.current=null; stRef.current.draggingStarIdx=-1; stRef.current.hoveredStarId=null; if(canvasRef.current) canvasRef.current.style.cursor='grab'; }}
        />
      )}
    </div>
  );
}

// ── Login Screen ──
function LoginScreen() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [mode, setMode] = useState('login');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [sent, setSent] = useState(false);

  const handle = async e => {
    e.preventDefault();
    setLoading(true); setError('');
    let res;
    if (mode === 'login') res = await sb.auth.signInWithPassword({ email, password });
    else res = await sb.auth.signUp({ email, password });
    if (res.error) setError(res.error.message);
    else if (mode === 'signup') setSent(true);
    setLoading(false);
  };

  const inpStyle = {
    width:'100%', padding:'10px 14px', background:'var(--s2)', border:'1px solid var(--bd2)',
    borderRadius:'4px', color:'var(--txt)', fontFamily:'var(--body)', fontSize:'14px',
    fontWeight:600, outline:'none', boxSizing:'border-box',
  };

  return (
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',
      backgroundImage:'linear-gradient(rgba(15,168,245,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(15,168,245,.03) 1px,transparent 1px)',
      backgroundSize:'52px 52px'}}>
      <div style={{width:'360px',background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:'8px',padding:'36px 32px'}}>
        <div style={{fontFamily:'var(--hud)',fontSize:'22px',fontWeight:900,color:'var(--pur)',letterSpacing:'5px',textAlign:'center',marginBottom:'8px',textShadow:'0 0 24px rgba(15,168,245,.7)'}}>⟨SYSTEM⟩</div>
        <div style={{fontFamily:'var(--hud)',fontSize:'10px',color:'var(--mut2)',letterSpacing:'3px',textAlign:'center',marginBottom:'28px'}}>
          {mode === 'login' ? 'ВХОД В СИСТЕМУ' : 'РЕГИСТРАЦИЯ'}
        </div>
        {sent ? (
          <div style={{textAlign:'center',color:'var(--grn)',fontFamily:'var(--hud)',fontSize:'12px',letterSpacing:'1px',lineHeight:1.6}}>
            Письмо отправлено!<br/>Подтверди email, затем войди.
          </div>
        ) : (
          <form onSubmit={handle} style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            <input style={inpStyle} type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required />
            <input style={inpStyle} type="password" placeholder="Пароль" value={password} onChange={e=>setPassword(e.target.value)} required minLength={6} />
            {error && <div style={{color:'var(--red)',fontFamily:'var(--hud)',fontSize:'11px',letterSpacing:'1px'}}>{error}</div>}
            <button type="submit" className="btn btn-pur" style={{width:'100%',justifyContent:'center'}} disabled={loading}>
              {loading ? '...' : mode === 'login' ? 'ВОЙТИ' : 'СОЗДАТЬ АККАУНТ'}
            </button>
          </form>
        )}
        <div style={{textAlign:'center',marginTop:'18px'}}>
          <button onClick={()=>{setMode(m=>m==='login'?'signup':'login');setError('');setSent(false);}}
            style={{background:'none',border:'none',color:'var(--mut2)',fontFamily:'var(--hud)',fontSize:'10px',letterSpacing:'1.5px',cursor:'pointer'}}>
            {mode === 'login' ? 'НЕТ АККАУНТА? РЕГИСТРАЦИЯ' : 'УЖЕ ЕСТЬ АККАУНТ? ВОЙТИ'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Root (auth gate) ──
function Root() {
  const [session, setSession] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setChecking(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_, s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);

  if (checking) return (
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <div style={{fontFamily:'var(--hud)',color:'var(--pur)',letterSpacing:'6px',fontSize:'16px',textShadow:'0 0 24px rgba(15,168,245,.7)'}}>...</div>
    </div>
  );
  if (!session) return <LoginScreen />;
  return <App session={session} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
